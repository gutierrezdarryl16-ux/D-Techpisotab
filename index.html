<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>D-TECH Pisotab OS v2.1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Navigation bar (Lilitaw lang kapag unlocked) */
        header {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .admin-btn {
            background: #334155;
            color: #cbd5e1;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        /* Emergency hidden admin trigger para sa Lock Screen */
        .hidden-admin-trigger {
            position: fixed;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: transparent;
            z-index: 10000;
            cursor: pointer;
        }

        /* Main App Interface Area */
        main {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* Gaming Grid Layout */
        .gaming-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.2);
        }

        .game-card img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            margin-bottom: 12px;
            border-radius: 12px;
        }

        .game-card h3 {
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f1f5f9;
        }

        .game-card p {
            font-size: 12px;
            color: #10b981;
            font-weight: 500;
        }

        /* Overlay/Modals System */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* EKSAGTONG DISENYO MULA SA IMAGE_599542.PNG */
        .lock-view {
            background-color: #060913; 
            flex-direction: column;
            text-align: center;
            padding: 20px;
            border: 15px solid #bd1c1c; /* Pulong border frame sa gilid */
            border-radius: 30px;
        }

        .coin-icon-container {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #521818 0%, #290808 100%);
            border: 2px solid #bd1c1c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(189, 28, 28, 0.3);
        }

        .coin-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%);
            border-radius: 50%;
            border: 3px dashed #b45309;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #78350f;
            font-weight: bold;
            font-size: 24px;
        }

        .lock-title {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            color: #ef4444; 
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .lock-subtitle {
            font-size: 16px;
            color: #94a3b8;
            max-width: 500px;
            margin-bottom: 35px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .rate-badge {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #fbbf24; /* Yellow text sa rate code */
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Admin Dialog Box style */
        .modal-box {
            background: #1e293b;
            border: 2px solid #3b82f6;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-box h2 { margin-bottom: 15px; color: #f8fafc; }
        .modal-box select {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569;
            color: #fff; border-radius: 8px; font-size: 16px; margin-bottom: 15px; outline: none;
        }
        .modal-box button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-close { background: #475569; color: white; }
    </style>
</head>
<body>

    <!-- SECRETO AT TRANSPARENT NA BUTTON PARA SA ADMIN (Kapag naka-lock ang screen, i-tap mo lang ang top-right corner para mag-admin code) -->
    <div class="hidden-admin-trigger" onclick="promptAdminPin()"></div>

    <!-- TOP CONTROL HEADER (Lilitaw lang kapag may oras) -->
    <header>
        <div class="logo">D-TECH VENDO</div>
        <div id="timeStatus" style="font-weight: 500; color: #10b981;">🟢 VENDO ACTIVE - ENJOY APPS!</div>
        <button class="admin-btn" onclick="promptAdminPin()">⚙️ Admin</button>
    </header>

    <!-- MAIN APP SCREEN (Dito lalabas ang mga app kapag may hulog na barya) -->
    <main>
        <div class="section-title">AVAILABLE APPS & GAMES</div>
        <div class="gaming-grid" id="gamesContainer">
            <!-- Dynamic game cards will load here via JavaScript -->
        </div>
    </main>

    <!-- ANG IYONG ORIGINAL LOCK SCREEN VIEW MULA SA IMAGE_599542.PNG -->
    <div id="lockScreen" class="overlay lock-view" style="display: flex;">
        <div class="coin-icon-container">
            <div class="coin-icon">Ⅲ</div>
        </div>
        <h1 class="lock-title">D-TECH VENDO LOCKED</h1>
        <p class="lock-subtitle">Pakisiguradong may oras ang Allan Timer bago hawakan ang tablet.</p>
        <div class="rate-badge">
            RATE: ₱1.00 = 4 MINUTES | ₱5.00 = 20 MINUTES
        </div>
    </div>

    <!-- OWNER ADMIN DASHBOARD MODAL -->
    <div id="adminModal" class="overlay" style="display: none; background: rgba(15, 23, 42, 0.95);">
        <div class="modal-box">
            <h2>⚙️ Owner Dashboard</h2>
            <button class="btn-success" onclick="unlockFreePlay()">🔓 ACTIVATE FREE PLAY</button>
            <button class="btn-danger" onclick="clearSavedGames()">🗑️ RESET APPS TO DEFAULT</button>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            
            <h3 style="margin-bottom: 10px; color: #94a3b8; font-size: 16px;">➕ Quick Add Installed Game</h3>
            <select id="tabletAppDropdown">
                <option value="">-- Loading apps from tablet... --</option>
            </select>
            
            <button class="btn-primary" onclick="addSelectedGameFromTablet()">Add Selected Game</button>
            <button class="btn-close" onclick="closeAdminDashboard()" style="margin-top: 15px;">Close Panel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
